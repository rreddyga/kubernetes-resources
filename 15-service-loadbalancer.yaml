#LoadBalancer service type is used to expose the service externally using a cloud provider's load balancer.
#It is accessible from outside the cluster using the load balancer's IP address with DNS name.
apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer
spec:
  #LoadBalancer is subset of NodePort. It exposes the service externally using a cloud provider's load balancer.
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    environment: dev
  ports:
  - protocol: TCP
    port: 80 # service port
    targetPort: 80 # container port
    nodePort: 30007
